body:
  text: 強名子注解一氣未分一者道之所立氣者一之所生未分為混沌未分也此言一氣雖從大道以成名而且混沌之氣未分清濁也此則是無名生有名有名生萬物道經云無名天地之始有名萬物之母無名言道也有名言氣也言道者是一氣之父言一氣者萬物之母有相有形未有不因一氣而生者也是故修生則貴道修道則重氣言氣是精神之本性命之源神明之主人若得法修之克為神仙矣故黃庭經云出清入玄二氣焕子若遇之升天漢又云何不食氣太和精故不入死居黃寧其義明矣三才同源三才者天地人為三才也同源是三才同居混沌之源也清濁既異清者天也濁者地也既已也異别也此言混沌之氣分别也則清氣騰而為天濁氣降而為地人在其中是已有分别也元精各存元者元氣也精者元氣之精也言天地人元氣之精各存也天法象我此言元精雖存而天法象與人無二也我法象天言人法象天以成形也或問曰前言天法象我我法象天天道因甚無傾覆人道何故有死生佘答曰天道雖有樞機而清虛無心清虛而無其心則元氣自運既元氣自運則五行無妨五行無妨則無刑剋既無刑剋則是大空既是大空則與道合同是以不傾也余又答曰人有生死者非與天道不同也乃人之自致也自致者從父母媾結精氣至成形降生便有悲啼喜怒哀樂漸漸口貪五味耳聽五聲眼觀五色心耽五欲一向萬機無所不有此已上四事皆因有心之變動也既有其心是無清虛也既無清虛是人失道也既人失道則與萬類同矣衆物齊焉任運死生隨緣枯朽或如石火或似浮漚成時暫成滅時便滅此蓋人之自為非大道之所致也人若心能無心色能無色味能無味觀能無觀欲能無欲聽能無聽機能無機和光同塵湛然常存則與道同矣又何不得長生如天之乎我命在我言人性命生死由人自已人若能知自然之道運動元和之氣外吞二景內服五芽動制百靈靜安五藏則寒溫飢渴不能侵五兵白刃不能近死生在手變化由心地不能埋天不能煞此之為我命在我也不在於天言人性命死生不由天也昧用者夭言昧用元氣之人反致夭壽此則須事明師傳受方可得為之不然則必致夭壽也善用者延言達元氣道理之人則壽命延長氣和體寂氣元氣也體形體也言元氣淳和而形體自寂形體既寂而氣自和守一神間一者一氣也神者神形也此言人但能守一氣則神形自然間矣夫神者是氣之子氣者神之母但知守其母則子不遠知守其君則神不散此皆合自然之道譬如水潤下火炎上雲從龍風從虎之類是也靈芝在身靈芝芝草也在身在人身中也指元氣是也不在名山不在名山所採也反一守和一是一神也和是和氣也前言守一神間此言反一神守和氣是為神氣相守者為念念相續綿綿不斷是也理合重玄理道理也重玄又玄也言人能知反一神却守和氣此名玄之又玄也精極乃明精為精氣也明為神明也此言人得抱元守一之法則精氣充滿乃通於神明矣神極乃靈神是一神也靈是人通靈也此言人逹抱元守一之道者則三萬六千神常不離人則自然通靈也氣極乃清清氣為神濁氣為形氣為元氣也清為清虛也此言元氣既極則濁氣自散人乃清虛也因氣而衰此言人皆因氣衰則形衰也因氣而榮人氣王則身榮也因氣而滅人氣竭則身滅也因氣而生人皆因元氣交結以生身也喜怒亂氣言人或喜或怒皆亂正氣也情性交爭言人既有喜怒則情性交爭也擁隔成病前言情性交爭則元氣擁隔也氣既擁隔則成病矣神形豈寧神為萬神形為形體豈寧為形體不得安寧也煉陽銷陰煉如燒煉也陽是陽氣也銷如銷鑠也陰是陰氣也上言神形不得安寧此言煉陽銷陰此是擒制之門調治之法大凡求仙學道攝養乖宜則須知燒煉陽氣而銷鑠陰邪則可以長生矣且凡人病患皆因五味以生身却因五味以喪身初服氣時但先積心火以通身燒之燒訖則依法服之無不愈者廣成子曰積火以燒五毒五毒者五味也五毒盡可以長生矣其氣自行其神自靈此言陰氣消散之後陽氣自行以正遣邪正為正氣邪為邪氣也言用正氣而發遣邪氣也其患自平平如不患時也上言以正氣遣邪氣則如湯沃雪以火銷冰自然平復如故矣乾坤澄靜此已下説服氣法次序也乾天也坤地也言為天地澄清無風雲霧雨雪時也子後午前子為夜半時也午為日午時也大凡吐納調服元氣皆取夜半子時直至日午已前並可調服號曰六陽之氣也午後至夜半子時號曰六陰之氣也不許吐納調服內氣則百無所妨閉目平坐此為天道澄清子後午前吐納調服時也則須閉目向王方平坐調服是平常之法也握固瞑然閉目平坐便須握固握固握大拇指也瞑然瞑目也似閉不閉是也納息廬中廬鼻也後便納外息於鼻中微微引入令滿氣海已久為妙號曰納新是也吐息天關吐息吐氣也天關口也前既引納外氣入氣海中既良久又須吐之則號曰吐故是也入息微微微微為鼻引外氣時微微引入不令耳聞小則生之門大則死之路故引納宜微微然出息綿綿以意引氣此為鼻引外氣時也須以意引外氣直入氣海中也腑臟回旋此言以意引外氣入氣海滿則五臟六腑之氣自然回旋小轉動作聲汩汩然然後呵之呵為口呵吐之上言腑臟回旋氣極又須呵吐之不得強閉也榮衛通宣此言既行吐納之理則榮衛無擁滯也但有不和為人非時五臟六腑不和也遣之踵前遣之上文云已正遣邪是踵前南華經云衆人之息以喉真人之息以踵踵猶跟也又胎息經云凡人呼吸與真人呼吸有殊凡人息氣出入於咽喉真人息氣於氣海是氣之根本之處余按外出云踵足為踵踵為腳跟也此言踵踵為氣根也跟之言根也言氣海是人生根本之處故但有不和則令發遣邪氣胎息如前法是也呵五六度呵為六氣也言大凡五臟六腑之氣皆屬心心屬呵但以呵吐納之為上法也吐納畢則依法服氣行氣無疾不蠲言依呵吐納之無疾病不蠲除也凡欲胎息氣凝曰胎呼吸曰息則胎向氣中凝氣向胎中息故曰胎息也導引為先為子後午前未閉目平坐握固瞑然前也經脈不擁言先導引則經脈氣不擁滯也關節不煩言為導引擺掣動關節元氣流行無所擁滯故言關節不煩悶也或如射雕此已下是導引法也此言如人翻身射雕之勢也側身彎環一句便是射雕勢也或舉腰背此又是一法仰卧以兩手背托地便舉腰收腳令頭著地是也如蟾半圓此是舉腰法交指腦後此别是一法以兩手十指相叉交於腦後抱著玉枕是也左旋右旋上言交指腦後次便須回頭背或左旋轉或右旋轉是也徑手足氣言導引時徑挺兩手便感元氣是也出於指端上言既徑挺手足元氣自然出於十指之端也擺掣四肢此言為導引時擺掣動手足故云四肢也捉搦三關此言為導引時或閉氣或握固直至腳十趾皆捉搦之是也三關口手腳也熟摩尺宅以兩手摩面上是也氣海亦然為亦使兩手摩之叩齒集神大凡服氣導引須先叩齒三十六通以集五臟之神齒為上下齒號曰天鼓神聞鼓聲則集矣合眸固關眸為眼目也關為口手足也言三關閉則萬邪不入冥心放骸萬慮不入放縱也骸形骸也此言灰心萬慮不入放縱形骸如太空是也任氣往還閉口任氣神廬中往還也覺氣調勻覺鼻中生還之氣調勻也擁塞喉關喉氣和取出息時便閉氣令外不入內不出是擁塞喉關也擁塞則咽此為前擁塞得元氣在喉間既外不入內不出則咽之三咽相連又説咽氣之常法也三咽相連為一閉氣三連咽之不許津與氣同咽也轉舌漱入為閉氣時却微吐出氣在口中含之以舌小轉動便漱入也咽下丹田此言漱咽下元氣直入丹田下丹田臍下三寸氣海是也以意引氣既咽下氣則以意引氣令入丹田令聲汨然咽氣下時有聲汩汨然如水瀝坎聞之分明一咽三咽此言咽氣時一咽至三咽則一閉氣三連咽是也再咽如前此言三咽既畢任氣從神廬中往來候氣調則如前三連咽之是再咽如前也三十六咽是每三連咽畢候氣調則如前三連咽之直至三十六咽氣之常宜也黃庭經云三十六咽玉池裏此之謂也若未絶粒即須少食務令腹中曠然虛淨無問坐卧但腹空則咽之一日通夕至十度自然三百六十咽矣若久服通頓至三百六十咽亦謂之中成一千二百咽謂之大成是為太息也如小胎息但閉氣數至一千或一百息亦謂之大成然不能煉形易質縱得長生如同枯木無精光也凡有攝養乖宜卒生疾患但依服氣法急治之取差咽氣時不必三十六咽也上至三十咽五十六十七十八十九十一百咽並得腹內氣轉四肢氣通則須且卧放散手閉口任氣從神廬中往來令微微然但微之又微閉氣多出少是法此可為真胎矣胎息成焉胎息氣但三連咽咽至三十六咽為成大道無為大道喻人身無為是無所施為也但習胎息時或坐或卧或行或立任氣胎息縱身如大空始至無為是人無身也既至無身則是無亂想既無亂想則元氣不求而自至不召而自來而無不為此言却破大道無為恐學人執著無為故云無不為也若能無為前注云縱身如彼大空是也是名無思前注云既如大空所空無心是名無思若能無思前注云若能空空無心則自然所無思也萬物自歸萬物萬姓也萬姓指元歸也自歸者則自然歸也言能無思則元氣自然歸身也若作用而求元氣者如緣木求魚也法象無二言習真氣還元之道古今如一不假施為言自然也如作用而強施為者非不寒不熱此説是真氣還元返木之功效也久而行之則不寒不熱不渴不飢此一句真氣功效也勤而行之乃至不渴不飢也妙中之妙微中之微此上二句是讚此真氣還元之不可思議視之而不見聽之而不聞搏之而不得與希夷微同矣恬然無欲恬為無味之味然常也言此道恬常而無所欲以道自恰怡悅也言人得真氣還元之道且我命在我不在於天功滿之後白日升天坐在立亡萬神朝拜山嶽傾而我不傾世界壞而我不壞故自怡然矣懷道君子此一句指學道之人也銘之佩之此一句令求學仙道之人敬重此文可以鎸之於石佩帶於身矣真氣還元銘終
