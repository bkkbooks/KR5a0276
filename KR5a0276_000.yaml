front:
  text: 真氣還元銘序重五余幼親墳典長慕煙霞比跳龍門欲攀蟾桂著錦衣於世上騎躍馬於人間置立機關開張造化榮沾父子福及子孫體仁義為當代之楷模用禮智作將來之規矩夢未同於傳説釣不遇於薑牙而遂灰心志求仙道詩書陡罷筆硯頓拋見寰區之多少是非睹朝市之無限得失榮如石火貴似浮漚不假高低瞥然聚散尸行鬼步非聖哲莫可知之動肉活塵非賢良莫能分别邇後專尋幽洞遍訪名山歷險登危二十年矣自梁貞明歲遊於泰山頂高松之下忽見一人形容異俗言語非常唯稱萬代之師秪道九天之主余遂稽首長跪為余曰汝有仙相方得遇吾付汝學仙之門汝能受否余又長跪感謝形言又曰吾請汝剪髮歃血為盟與汝屈伸吐納煉形之術又曰兩紀之內輒莫傳人傳之非人彼受譴責余又長跪忽然不見余自後常依次第不輟功夫但是微言無不神驗余既承師命合祕天機兩紀將終許傳人世而乃重修舊則翻作新經寫之市朝藏諸山石後來學者得之幸哉真氣還元銘
  hash: sha256:8aca0664d4fec6509c59327b07982da9e6f0a84cb30b741f5bb8639ca85f6e7e
